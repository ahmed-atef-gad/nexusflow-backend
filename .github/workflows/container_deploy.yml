name: Build & Deploy NexusFlow Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- Docker ----------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/nexusflow-backend:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/nexusflow-backend:latest

      # ---------- Azure ----------
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Instance
        run: |
          az container delete \
            --resource-group nexusflow-rgs \
            --name nexusflow-backend \
            --yes || true

          az container create \
            --resource-group nexusflow-rgs \
            --name nexusflow-backend \
            --location eastus \
            --image ${{ secrets.DOCKERHUB_USERNAME }}/nexusflow-backend:latest \
            --dns-name-label nexusflow-backend-${{ github.run_id }} \
            --ports 3000 \
            --secure-environment-variables \
              MONGO_URI="${{ secrets.MONGO_URI }}" \
              JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              MQTT_URL="${{ secrets.MQTT_URL }}" \
              MQTT_USERNAME="${{ secrets.MQTT_USERNAME }}" \
              MQTT_PASSWORD="${{ secrets.MQTT_PASSWORD }}"
